apiVersion: apps/v1
kind: Deployment
metadata:
  name: aspnetapp
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: aspnetapp
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Staging"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "192Mi"
