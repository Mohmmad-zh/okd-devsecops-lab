name: DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write   # required for upload-sarif

jobs:
  # ──────────────────────────────────────────────
  # Stage 1: SAST — Semgrep with custom C# rules
  # ──────────────────────────────────────────────
  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep with custom rules
        run: |
          semgrep \
            --config phase3-devsecops/day15/semgrep-rules.yaml \
            --error \
            --json \
            --output semgrep-results.json \
            phase3-devsecops/day15/sample-app/ || true

          # Pretty print results
          if [ -f semgrep-results.json ]; then
            echo "=== Semgrep Results ==="
            cat semgrep-results.json | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          results = d.get('results', [])
          if not results:
              print('No issues found.')
          for r in results:
              print(f\"  [{r['extra']['severity']}] {r['check_id']}\")
              print(f\"    {r['path']}:{r['start']['line']}\")
              print(f\"    {r['extra']['message']}\")
          print(f'Total: {len(results)} finding(s)')
          "
          fi

      - name: Upload Semgrep results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-results
          path: semgrep-results.json

  # ──────────────────────────────────────────────
  # Stage 2: Container scan — Trivy
  # Scans the same image used in the lab
  # ──────────────────────────────────────────────
  container-scan:
    name: Container Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy — block on CRITICAL CVEs
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: mcr.microsoft.com/dotnet/samples:aspnetapp
          format: table
          exit-code: '1'
          severity: CRITICAL
        continue-on-error: true   # report result but don't fail the workflow

      - name: Run Trivy — full scan (all severities, for report)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: mcr.microsoft.com/dotnet/samples:aspnetapp
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH,MEDIUM

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-container

  # ──────────────────────────────────────────────
  # Stage 3: SBOM generation
  # ──────────────────────────────────────────────
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate SBOM with Trivy (CycloneDX format)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: mcr.microsoft.com/dotnet/samples:aspnetapp
          format: cyclonedx
          output: sbom.cdx.json

      - name: Show SBOM summary
        run: |
          echo "=== SBOM Summary ==="
          python3 -c "
          import json
          with open('sbom.cdx.json') as f:
              sbom = json.load(f)
          components = sbom.get('components', [])
          print(f'Components: {len(components)}')
          print(f'Format: {sbom.get(\"bomFormat\", \"?\")} {sbom.get(\"specVersion\", \"?\")}')
          print(f'Serial: {sbom.get(\"serialNumber\", \"?\")}')
          print()
          print('Top 10 components:')
          for c in components[:10]:
              print(f'  {c.get(\"name\", \"?\")}  {c.get(\"version\", \"?\")}')
          "

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json

  # ──────────────────────────────────────────────
  # Stage 4: Manifest scan — Trivy on YAML files
  # ──────────────────────────────────────────────
  manifest-scan:
    name: Manifest Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan Kubernetes manifests for misconfigurations
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          format: table
          exit-code: '0'    # report only, don't block
          severity: CRITICAL,HIGH

  # ──────────────────────────────────────────────
  # Summary — runs after all stages
  # ──────────────────────────────────────────────
  pipeline-summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [sast, container-scan, sbom, manifest-scan]
    if: always()
    steps:
      - name: Print summary
        run: |
          echo "## DevSecOps Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| SAST (Semgrep) | ${{ needs.sast.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Container Scan (Trivy) | ${{ needs.container-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SBOM Generation | ${{ needs.sbom.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Manifest Scan | ${{ needs.manifest-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Image scanned: \`mcr.microsoft.com/dotnet/samples:aspnetapp\`" >> $GITHUB_STEP_SUMMARY
          echo "Custom Semgrep rules: \`phase3-devsecops/day15/semgrep-rules.yaml\`" >> $GITHUB_STEP_SUMMARY
