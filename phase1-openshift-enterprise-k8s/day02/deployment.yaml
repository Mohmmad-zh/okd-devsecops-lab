apiVersion: apps/v1
kind: Deployment
metadata:
  name: aspnetapp
  namespace: dotnet-demo
  labels:
    app: aspnetapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aspnetapp
  template:
    metadata:
      labels:
        app: aspnetapp
    spec:
      # ── Service Account (Day 4) ───────────────────────────────────────────────
      serviceAccountName: aspnetapp-sa
      automountServiceAccountToken: false   # app doesn't call the K8s API

      # ── Security: OpenShift assigns UID from namespace range (restricted-v2 SCC) ──
      # Do NOT hardcode runAsUser/fsGroup — OpenShift allocates them per namespace.
      # runAsNonRoot is enforced by restricted-v2 automatically.
      securityContext:
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: aspnetapp
          image: mcr.microsoft.com/dotnet/samples:aspnetapp
          ports:
            - containerPort: 8080
              protocol: TCP

          # ── Container-level security context ─────────────────────────────
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL

          # ── Environment ───────────────────────────────────────────────────
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: DOTNET_RUNNING_IN_CONTAINER
              value: "true"

          # ── Resource limits ───────────────────────────────────────────────
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

          # ── Liveness probe ────────────────────────────────────────────────
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

          # ── Readiness probe ───────────────────────────────────────────────
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
